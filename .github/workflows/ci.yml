name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          LIVE_TRADING: "false"
          BYBIT_DEMO_API_KEY: "ci-placeholder"
          BYBIT_DEMO_API_SECRET: "ci-placeholder"
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_mt5_account.py \
            -v --tb=short
